name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Lint, type-check, offline tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev and server extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: Lint (ruff)
        run: ruff check src

      # mypy --strict currently has known findings; advisory only for now.
      - name: Type check (mypy, advisory)
        run: mypy src
        continue-on-error: true

      # Offline suite only. The network tests (test_e2e.py,
      # test_new_features_edge.py) make live API calls and are NOT run in CI.
      - name: Offline test suite
        run: python tests/test_edge_cases.py
