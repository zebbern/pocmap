name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    name: Lint, type-check, tests
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package with dev and server extras
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,server]"

      - name: Lint (ruff)
        run: ruff check src

      - name: Type check (mypy --strict)
        run: mypy src

      - name: Offline pytest suite
        # `addopts = -m 'not network'` in pyproject keeps this offline: it runs
        # the native regression tests (SSRF, EPSS scale, HTML report) and skips
        # the live-network suites (test_e2e.py, test_new_features_edge.py).
        run: python -m pytest -q

      - name: Offline characterization suite
        run: python tests/test_edge_cases.py
